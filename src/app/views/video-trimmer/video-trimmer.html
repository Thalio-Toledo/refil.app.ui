    <label class="btn-outline" *ngIf="loaded" for="video-upload-input">MUDAR VÍDEO</label>
  </header>

  <main class="app-main">
    <section class="preview">
      <div class="preview-frame" [class.empty]="!loaded">
        <ng-container *ngIf="videoSrc; else noVideo">
          <video
            #videoPlayer
            [src]="videoSrc"
            (loadedmetadata)="onLoadedMetadata($event)"
            (timeupdate)="onTimeUpdate($event)"
            playsinline
            muted
            controls
          ></video>
          <div class="loading-overlay" *ngIf="!loaded">
            Carregando vídeo...
          </div>
        </ng-container>
        <ng-template #noVideo>
          <label class="btn-primary upload-btn" for="video-upload-input">FAZER UPLOAD</label>
        </ng-template>
      </div>

      <div class="preview-meta">
        <div class="field-row">
          <label>Título do vídeo</label>
          <input
            type="text"
            [disabled]="!loaded"
            [value]="videoTitle"
            (input)="videoTitle = $any($event.target).value"
            placeholder="Nome do vídeo"
          />
        </div>
        <div class="field-row">
          <label>Autor do vídeo</label>
          <input
            type="text"
            [disabled]="!loaded"
            [value]="videoAuthor"
            (input)="videoAuthor = $any($event.target).value"
            placeholder="Nome do autor"
          />
        </div>
        <div class="field-row">
          <label>Tags do vídeo</label>
          <input
            type="text"
            [disabled]="!loaded"
            [value]="videoTagsInput"
            (input)="videoTagsInput = $any($event.target).value"
            placeholder="tag1, tag2, tag3"
          />
        </div>
      </div>

      <div class="timeline" [class.disabled]="!loaded">
        <div class="timeline-labels">
          <span>{{ formatTime(selectionStart) }}</span>
          <span>{{ formatTime(selectionEnd) }}</span>
        </div>
        <div class="timeline-track" #timelineTrack>
          <div class="selection-range" [style.left.%]="selectionStartPercent" [style.width.%]="selectionWidthPercent"></div>
          <div class="selection-edge start" [style.left.%]="selectionStartPercent"></div>
          <div class="selection-edge end" [style.left.%]="selectionEndPercent"></div>
          <button
            class="selection-pin start"
            type="button"
            [style.left.%]="selectionStartPercent"
            (pointerdown)="startRangeDrag('start', $event)"
            [disabled]="!loaded"
            aria-label="Mover início da seleção"
          ></button>
          <button
            class="selection-pin end"
            type="button"
            [style.left.%]="selectionEndPercent"
            (pointerdown)="startRangeDrag('end', $event)"
            [disabled]="!loaded"
            aria-label="Mover fim da seleção"
          ></button>
          <button
            class="selection-pin playhead"
            type="button"
            [style.left.%]="playheadPercent"
            (pointerdown)="startRangeDrag('playhead', $event)"
            [disabled]="!loaded"
            aria-label="Mover playhead"
          ></button>
        </div>
      </div>

      <div class="capture-actions">
        <div class="capture-block">
          <div class="format-pill">
            <button type="button" [class.active]="frameFormat === 'png'" (click)="frameFormat = 'png'" [disabled]="!loaded">PNG</button>
            <button type="button" [class.active]="frameFormat === 'jpg'" (click)="frameFormat = 'jpg'" [disabled]="!loaded">JPG</button>
          </div>
          <button class="btn-primary wide" type="button" (click)="captureFrame()" [disabled]="!loaded">CAPTURAR FRAME</button>
        </div>

        <div class="capture-block">
          <div class="format-pill">
            <button type="button" [class.active]="animationFormat === 'gif'" (click)="animationFormat = 'gif'" [disabled]="!loaded">GIF</button>
            <button type="button" [class.active]="animationFormat === 'webm'" (click)="animationFormat = 'webm'" [disabled]="!loaded">WEBM</button>
          </div>
          <button class="btn-primary wide" type="button" (click)="captureAnimation()" [disabled]="!loaded || capturingAnimation">
            {{ capturingAnimation ? 'GRAVANDO...' : 'CAPTURAR ANIMAÇÃO' }}
          </button>
          <small class="action-note" *ngIf="capturingAnimation">Gerando animação, isso pode levar alguns segundos.</small>
        </div>
      </div>
    </section>

    <aside class="sidebar">
      <div class="sidebar-header">
        <div>
          <h4>SESSION BUFFER</h4>
          <p>{{ sessionBuffer.length }} capturas</p>
        </div>
        <button class="btn-primary btn-sm" type="button" [disabled]="sessionBuffer.length === 0">UPLOAD</button>
      </div>

      <div class="buffer-info">
        <label>Tags globais</label>
        <input
          type="text"
          [disabled]="!loaded"
          [value]="videoTagsInput"
          (input)="videoTagsInput = $any($event.target).value"
          placeholder="Use vírgula para separar"
        />
      </div>

      <div class="asset-list">
        <div class="asset" *ngFor="let item of sessionBuffer">
          <div class="asset-thumb">
            <img [src]="item.thumbnail" alt="{{ item.name }}" />
          </div>
          <div class="asset-meta">
            <div class="asset-row">
              <span class="asset-name">{{ item.name }}</span>
              <span class="asset-type">{{ item.type.toUpperCase() }}</span>
            </div>
            <div class="asset-row asset-actions">
              <button class="btn-outline btn-sm" type="button" (click)="downloadItem(item)" [disabled]="!item.blob">BAIXAR</button>
              <span *ngIf="item.blob" class="asset-status">Pronto para download</span>
            </div>
            <div class="asset-tags">
              <span class="tag" *ngFor="let tag of item.tags; let i = index">
                {{ tag }} <button type="button" (click)="removeTag(item, i)">×</button>
              </span>
            </div>
            <div class="tag-input-row">
              <input
                type="text"
                [disabled]="!loaded"
                [value]="item.editTag || ''"
                (input)="item.editTag = $any($event.target).value"
                placeholder="Adicionar tag"
              />
              <button type="button" (click)="addTag(item)" [disabled]="!loaded || !item.editTag">Adicionar</button>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <input id="video-upload-input" type="file" #fileInput accept="video/*" (change)="onFileSelected($event)" hidden />
</div>
